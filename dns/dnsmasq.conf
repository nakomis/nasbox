# dnsmasq configuration for nasbox internal DNS
#
# Deployed to: /etc/dnsmasq.d/nasbox.conf
# Applied by:  dns/scripts/setup.sh
#
# Responsibilities:
#   - Authoritative for the .internal TLD (answers from hosts.internal)
#   - Forwards all other queries upstream

# ── Listening ─────────────────────────────────────────────────────────────────
# Only bind to loopback and the nasbox LAN IP; do not expose on VPN interfaces.
listen-address=127.0.0.1,172.29.0.5
bind-interfaces

# ── .internal TLD ─────────────────────────────────────────────────────────────
# Treat .internal as a local-only zone — never forward these upstream.
local=/internal/
domain=internal

# ── Upstream resolvers ────────────────────────────────────────────────────────
server=1.1.1.1
server=8.8.8.8

# ── Hosts file ────────────────────────────────────────────────────────────────
# Don't pull in the system /etc/hosts; use our own managed file only.
no-hosts
addn-hosts=/etc/hosts.internal

# ── Safety ────────────────────────────────────────────────────────────────────
# Don't forward bare (non-dotted) hostnames to upstream resolvers.
domain-needed
# Don't leak RFC-1918 reverse lookups upstream.
bogus-priv
