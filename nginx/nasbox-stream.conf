# Stream-level SSL passthrough — routes incoming port 443 connections by SNI.
#
# homeassistant.nakomis.com → forwarded as raw TLS to 172.29.0.20:8123
#   (HA terminates TLS itself with its own certificate)
#
# Everything else → localhost:8443 where the http block handles TLS termination.

map $ssl_preread_server_name $backend_443 {
    homeassistant.nakomis.com  172.29.0.20:8123;
    default                    127.0.0.1:8443;
}

server {
    listen 443;
    proxy_pass $backend_443;
    ssl_preread on;
}
