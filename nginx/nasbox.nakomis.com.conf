# nasbox.nakomis.com — nginx reverse proxy
# Each service gets its own subdomain, all covered by the wildcard cert.
#
# Services:
#   logs.nasbox.nakomis.com  → logserver (uvicorn on localhost:8765)

# HTTP → HTTPS redirect for all subdomains
server {
    listen 80;
    server_name *.nasbox.nakomis.com homeassistant.nakomis.com;
    return 301 https://$host$request_uri;
}

# SSL config shared across all vhosts (ssl_protocols/ciphers set globally in nginx.conf)
ssl_certificate     /etc/letsencrypt/live/nasbox.nakomis.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/nasbox.nakomis.com/privkey.pem;
ssl_ciphers         HIGH:!aNULL:!MD5;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 10m;

# ── logs.nasbox.nakomis.com ───────────────────────────────────────────────────
server {
    listen 8443 ssl;
    server_name logs.nasbox.nakomis.com;

    location / {
        proxy_pass         http://127.0.0.1:8765;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }
}

# ── nakotp.nasbox.nakomis.com ─────────────────────────────────────────────────
server {
    listen 8443 ssl;
    server_name nakotp.nasbox.nakomis.com;

    # Require a client certificate signed by the nakotp private CA
    ssl_verify_client      on;
    ssl_client_certificate /etc/nakotp/ca.crt;

    location / {
        proxy_pass         http://127.0.0.1:8766;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
