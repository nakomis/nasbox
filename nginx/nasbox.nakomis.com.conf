# nasbox.nakomis.com — nginx reverse proxy
# Serves all nasbox services behind the wildcard Let's Encrypt cert.
#
# Services:
#   /logs/   → logserver (uvicorn on localhost:8765)

server {
    listen 80;
    server_name nasbox.nakomis.com *.nasbox.nakomis.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name nasbox.nakomis.com *.nasbox.nakomis.com;

    ssl_certificate     /etc/letsencrypt/live/nasbox.nakomis.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nasbox.nakomis.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Log server
    location /logs/ {
        proxy_pass         http://127.0.0.1:8765;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Health check (useful for monitoring)
    location /health {
        proxy_pass http://127.0.0.1:8765;
    }

    location / {
        return 404;
    }
}
